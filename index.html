<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Finanzas</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; }
        input, select, textarea { user-select: text; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>;
        const IconTags = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 5 6.3 6.3a2.4 2.4 0 0 1 0 3.4L17 19"/><path d="M9.586 5.586A2 2 0 0 0 8.172 5H3v5.172a2 2 0 0 0 .586 1.414l8.204 8.204a2 2 0 0 0 2.828 0l4.204-4.204a2 2 0 0 0 0-2.828L10.614 4.586z"/><circle cx="7" cy="9" r="1"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('finanzas_categories')) || []);
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('finanzas_transactions')) || []);

            useEffect(() => {
                localStorage.setItem('finanzas_categories', JSON.stringify(categories));
                localStorage.setItem('finanzas_transactions', JSON.stringify(transactions));
            }, [categories, transactions]);

            const [newTx, setNewTx] = useState({ date: new Date().toISOString().split('T')[0], amount: '', place: '', categoryId: '', subcategoryId: '', method: 'Débito' });
            const [editingTxId, setEditingTxId] = useState(null);

            // Ordenado por fecha (reciente primero)
            const sortedTransactions = useMemo(() => {
                return [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [transactions]);

            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!newTx.amount || !newTx.place || !newTx.categoryId) return;
                if (editingTxId) {
                    setTransactions(transactions.map(t => t.id === editingTxId ? { ...newTx, id: editingTxId } : t));
                } else {
                    setTransactions([{ ...newTx, id: Date.now().toString() }, ...transactions]);
                }
                setEditingTxId(null);
                setNewTx({ date: new Date().toISOString().split('T')[0], amount: '', place: '', categoryId: '', subcategoryId: '', method: 'Débito' });
                setActiveTab('dashboard');
            };

            const renderDashboard = () => (
                <div className="space-y-6 pb-20 p-4">
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                        <h2 className="font-bold text-lg text-slate-800 mb-3">Historial de Gastos</h2>
                        {sortedTransactions.map(tx => {
                            const cat = categories.find(c => c.id === tx.categoryId);
                            const sub = cat?.subcategories?.find(s => s.id === tx.subcategoryId);
                            return (
                                <div key={tx.id} className="flex justify-between items-center p-3 mb-2 bg-slate-50 rounded-lg border border-slate-100">
                                    <div>
                                        <p className="font-medium text-slate-700">{tx.place}</p>
                                        <p className="text-xs text-slate-500">{tx.date} • {cat?.name} {sub ? `> ${sub.name}` : ''}</p>
                                    </div>
                                    <div className="flex flex-col items-end">
                                        <span className="font-bold text-slate-800">₡{Number(tx.amount).toLocaleString()}</span>
                                        <button onClick={() => { setEditingTxId(tx.id); setNewTx(tx); setActiveTab('add'); }} className="text-blue-600 mt-1"><IconEdit /></button>
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );

            const renderAddTransaction = () => (
                <div className="p-4 space-y-4">
                    <form onSubmit={handleAddTransaction} className="bg-white p-5 rounded-xl shadow-sm border border-slate-100 space-y-4">
                        <input type="date" className="w-full p-3 border rounded-lg bg-slate-50" value={newTx.date} onChange={e => setNewTx({...newTx, date: e.target.value})} />
                        <input type="number" className="w-full p-3 border rounded-lg bg-slate-50" placeholder="Monto" value={newTx.amount} onChange={e => setNewTx({...newTx, amount: e.target.value})} />
                        <input type="text" className="w-full p-3 border rounded-lg bg-slate-50" placeholder="Lugar" value={newTx.place} onChange={e => setNewTx({...newTx, place: e.target.value})} />
                        <select className="w-full p-3 border rounded-lg bg-slate-50" value={newTx.categoryId} onChange={e => setNewTx({...newTx, categoryId: e.target.value, subcategoryId: ''})}>
                            <option value="">Seleccione Categoría</option>
                            {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                        {newTx.categoryId && (
                            <select className="w-full p-3 border rounded-lg bg-slate-50" value={newTx.subcategoryId} onChange={e => setNewTx({...newTx, subcategoryId: e.target.value})}>
                                <option value="">Seleccione Subcategoría (Opcional)</option>
                                {categories.find(c => c.id === newTx.categoryId)?.subcategories?.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                            </select>
                        )}
                        <button type="submit" className="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold">Guardar Gasto</button>
                    </form>
                </div>
            );

            const renderCategories = () => (
                <div className="p-4 space-y-4">
                    {categories.map(c => (
                        <div key={c.id} className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                            <p className="font-bold text-slate-800">{c.name}</p>
                            <div className="mt-2 text-sm text-slate-500">
                                {c.subcategories?.map(s => <span key={s.id} className="block">• {s.name}</span>)}
                            </div>
                            <button onClick={() => {
                                const subName = prompt("Nombre de nueva subcategoría:");
                                if (subName) {
                                    setCategories(categories.map(cat => cat.id === c.id ? {...cat, subcategories: [...(cat.subcategories||[]), {id: Date.now().toString(), name: subName}]} : cat));
                                }
                            }} className="mt-3 text-emerald-600 font-bold text-sm">+ Agregar subcategoría</button>
                        </div>
                    ))}
                    <button onClick={() => { const name = prompt("Nombre categoría:"); if(name) setCategories([...categories, {id: Date.now().toString(), name, subcategories: []}]); }} className="w-full bg-slate-800 text-white p-4 rounded-xl font-bold">+ Nueva Categoría</button>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-emerald-600 text-white p-6 text-center font-bold text-xl shadow-md">Mis Finanzas</header>
                    <main>{activeTab === 'dashboard' ? renderDashboard() : activeTab === 'add' ? renderAddTransaction() : renderCategories()}</main>
                    <nav className="fixed bottom-0 w-full bg-white border-t flex justify-around p-4 shadow-lg pb-safe">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-emerald-600' : 'text-slate-400'}>Resumen</button>
                        <button onClick={() => { setEditingTxId(null); setActiveTab('add'); }} className={activeTab === 'add' ? 'text-emerald-600' : 'text-slate-400'}>Gasto</button>
                        <button onClick={() => setActiveTab('categories')} className={activeTab === 'categories' ? 'text-emerald-600' : 'text-slate-400'}>Categorías</button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
